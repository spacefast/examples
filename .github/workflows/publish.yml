name: Publish examples

on:
  pull_request:
    branches: [master]
    paths:
      - "examples/**"
      - "scripts/**"
      - "meta.example.json"
      - "TEMPLATE.md"
      - ".github/workflows/publish.yml"
  push:
    branches: [master]
    paths:
      - "examples/**"
      - "scripts/**"
      - "meta.example.json"
      - "TEMPLATE.md"
      - ".github/workflows/publish.yml"
  workflow_dispatch:
    inputs:
      only:
        description: "Publish only this example slug (optional)"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: false

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/build-manifest.mjs
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy-manifest:
    needs: manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy canonical JSON feed
        id: deployment
        uses: actions/deploy-pages@v4

  discover:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.list.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: list
        env:
          ONLY: ${{ inputs.only }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ -n "$ONLY" ]; then
            test -d "examples/$ONLY"
            jq -cn --arg slug "$ONLY" '[ $slug ]' | sed 's/^/slugs=/' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          all_slugs() {
            find examples -mindepth 1 -maxdepth 1 -type d -print \
              | sed 's#^examples/##' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))'
          }

          if [ "${{ github.event_name }}" = "pull_request" ] \
            || [ "${{ github.event_name }}" = "workflow_dispatch" ] \
            || [ -z "$BEFORE" ] \
            || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "slugs=$(all_slugs)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          if printf '%s\n' "$changed" | grep -Eq '^(scripts/|TEMPLATE.md$|meta.example.json$|.github/workflows/publish.yml$)'; then
            echo "slugs=$(all_slugs)" >> "$GITHUB_OUTPUT"
          else
            slugs=$(printf '%s\n' "$changed" | sed -n 's#^examples/\([^/]*\)/.*#\1#p' \
              | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: discover
    if: needs.discover.outputs.slugs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.discover.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install Spacefast CLI
        run: bun add -g spacefast
      - name: Build
        working-directory: examples/${{ matrix.slug }}
        run: |
          if [ -f site/package.json ]; then
            cd site
            bun install --frozen-lockfile || bun install
            bun run build
          fi
      - name: Resolve and validate publish directory
        id: dir
        working-directory: examples/${{ matrix.slug }}
        run: |
          if [ -d site/dist ]; then dir=site/dist
          elif [ -d site/build ]; then dir=site/build
          else dir=site
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          bun ../../scripts/validate-publish-dir.mjs "${{ matrix.slug }}" "$dir"
      - name: Publish existing Spacefast space
        if: github.event_name != 'pull_request'
        working-directory: examples/${{ matrix.slug }}
        env:
          SPACEFAST_TOKEN: ${{ secrets.SPACEFAST_DEPLOY_KEY }}
          SPACEFAST_API_URL: https://api.spacefast.com
        run: |
          sf publish "${{ steps.dir.outputs.dir }}" \
            --space "${{ matrix.slug }}" \
            --team spacefast-examples \
            --source-type git \
            --git-repository "${{ github.repository }}" \
            --git-branch "${{ github.ref_name }}" \
            --git-commit "${{ github.sha }}" \
            --wait \
            --json
